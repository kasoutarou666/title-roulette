<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="120" text-anchor="middle" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">🎰 Title Roulette</text>
  <text x="600" y="200" text-anchor="middle" font-family="sans-serif" font-size="36" fill="rgba(255,255,255,0.7)">Find your legendary title!</text>
  <text x="600" y="250" text-anchor="middle" font-family="sans-serif" font-size="28" fill="rgba(255,255,255,0.5)">（あなたの伝説の称号を見つけよう！）</text>
  <!-- スロット -->
  <rect x="160" y="300" width="240" height="120" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="280" y="365" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">Legendary</text>
  <text x="280" y="400" text-anchor="middle" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">伝説の</text>
  <rect x="480" y="300" width="240" height="120" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="600" y="365" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">Samurai</text>
  <text x="600" y="400" text-anchor="middle" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">侍</text>
  <rect x="800" y="300" width="240" height="120" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="920" y="365" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">Wanted</text>
  <text x="920" y="400" text-anchor="middle" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">指名手配中</text>
  <!-- ボタン -->
  <rect x="400" y="490" width="400" height="70" rx="35" fill="url(#btn)"/>
  <text x="600" y="535" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="white">🎰 SPIN!</text>
</svg>
